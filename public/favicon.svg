<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pink rounded square (brand color) -->
  <rect width="64" height="64" rx="14" ry="14" fill="#ea526f"/>

  <!-- Brand-style heart: two interlocking arcs (mirrors the Logo.astro mark) -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none">
    <!-- Left arc -->
    <path d="M 32 46
             Q 18 38, 14 26
             Q 12 16, 22 14
             Q 30 13, 33 22"/>
    <!-- Right arc -->
    <path d="M 32 46
             Q 46 38, 50 26
             Q 52 16, 42 14
             Q 34 13, 31 22"/>
  </g>
</svg>
